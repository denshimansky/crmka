name: Deploy to Timeweb

# Прод-кандидат на Timeweb (msk1.umnayacrm.ru) деплоится на каждый push в main —
# так же, как Hetzner-dev (deploy.yml). Path-фильтр идентичен Hetzner: чисто-доковые
# коммиты не вызывают пересборку ни там, ни тут. Плюс ручной запуск (workflow_dispatch).
# Hetzner deploy.yml НЕ трогаем; nginx-конфиг msk1 держится локально на сервере (не в git).

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'docker-compose.yml'
      - 'nginx/**'
      - 'scripts/**'
      - '.github/workflows/deploy-timeweb.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 201.51.1.81
          port: 22
          username: deploy
          key: ${{ secrets.TIMEWEB_SSH_KEY }}
          script: |
            cd /opt/crmka
            git checkout -f main
            git pull --ff-only origin main
            # Гарантируем ALLOW_DESTRUCTIVE_API (для seed/reset на стенде)
            if ! grep -q "^ALLOW_DESTRUCTIVE_API=" .env 2>/dev/null; then
              echo "ALLOW_DESTRUCTIVE_API=true" >> .env
            fi
            docker compose build app
            docker compose up -d
            # Baseline: если _prisma_migrations не существует, создаём и помечаем initial как applied
            docker compose exec -T db psql -U crmka -c "
              CREATE TABLE IF NOT EXISTS \"_prisma_migrations\" (
                id VARCHAR(36) PRIMARY KEY,
                checksum VARCHAR(64) NOT NULL,
                finished_at TIMESTAMPTZ,
                migration_name VARCHAR(255) NOT NULL,
                logs TEXT,
                rolled_back_at TIMESTAMPTZ,
                started_at TIMESTAMPTZ NOT NULL DEFAULT now(),
                applied_steps_count INTEGER NOT NULL DEFAULT 0
              );
              INSERT INTO \"_prisma_migrations\" (id, checksum, migration_name, finished_at, applied_steps_count)
              SELECT gen_random_uuid(), '', '20260331093420_initial', NOW(), 1
              WHERE NOT EXISTS (SELECT 1 FROM \"_prisma_migrations\" WHERE migration_name = '20260331093420_initial');
            "
            docker compose exec -T app npx prisma migrate deploy
            # Чистим build cache старше 7 дней (образы НЕ трогаем — node:22-alpine остаётся в кеше)
            docker builder prune -af --filter "until=168h" || true
            echo "Deploy complete: $(date)"
            # Уведомление в Telegram (токен в .env на сервере; экранируем HTML в теме коммита)
            SUBJ=$(git log -1 --pretty='%h — %s' | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')
            ./scripts/notify-telegram.sh "<b>✅ Деплой msk1 OK</b>
            ${SUBJ}"

      - name: Notify failure via Telegram
        if: failure()
        uses: appleboy/ssh-action@v1
        with:
          host: 201.51.1.81
          port: 22
          username: deploy
          key: ${{ secrets.TIMEWEB_SSH_KEY }}
          script: |
            /opt/crmka/scripts/notify-telegram.sh "<b>❌ Деплой msk1 УПАЛ</b>
            лог: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
