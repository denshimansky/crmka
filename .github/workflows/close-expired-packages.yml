name: Close expired packages (daily)

on:
  schedule:
    # Каждый день в 03:15 UTC — сразу после check-inactive-clients.
    - cron: '15 3 * * *'
  workflow_dispatch:

jobs:
  close:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger close-expired-packages
        env:
          CRON_URL: ${{ secrets.CRON_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "CRON_URL / CRON_SECRET не настроены в GitHub Secrets"
            exit 1
          fi
          response=$(curl -sS -w "\n%{http_code}" -X POST "$CRON_URL/api/cron/close-expired-packages" \
            -H "Authorization: Bearer $CRON_SECRET")
          body=$(echo "$response" | head -n -1)
          status=$(echo "$response" | tail -n 1)
          echo "HTTP $status"
          echo "$body"
          if [ "$status" != "200" ]; then
            exit 1
          fi
