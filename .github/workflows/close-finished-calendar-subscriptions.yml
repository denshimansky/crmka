name: Close finished calendar subscriptions (monthly)

on:
  schedule:
    # 1-го числа каждого месяца в 00:00 UTC (= 03:00 МСК).
    # Закрываем календарные абонементы за прошедший месяц, у которых нет долга
    # и все занятия отработаны (посещение 100%-списания).
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  close:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger close-finished-calendar-subscriptions
        env:
          CRON_URL: ${{ secrets.CRON_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "CRON_URL / CRON_SECRET не настроены в GitHub Secrets"
            exit 1
          fi
          response=$(curl -sS -w "\n%{http_code}" -X POST "$CRON_URL/api/cron/close-finished-calendar-subscriptions" \
            -H "Authorization: Bearer $CRON_SECRET")
          body=$(echo "$response" | head -n -1)
          status=$(echo "$response" | tail -n 1)
          echo "HTTP $status"
          echo "$body"
          if [ "$status" != "200" ]; then
            exit 1
          fi
