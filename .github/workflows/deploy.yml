name: Deploy to dev

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'docker-compose.yml'
      - 'nginx/**'
      - 'scripts/**'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        id: deploy
        uses: appleboy/ssh-action@v1
        with:
          host: 65.108.45.153
          port: 2280
          username: deploy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/crmka
            git pull origin main
            # Гарантируем что dev-сервер имеет ALLOW_DESTRUCTIVE_API=true (для seed/reset)
            if ! grep -q "^ALLOW_DESTRUCTIVE_API=" .env 2>/dev/null; then
              echo "ALLOW_DESTRUCTIVE_API=true" >> .env
            fi
            docker compose build app
            docker compose up -d
            # Baseline: если _prisma_migrations не существует, создаём и помечаем initial как applied
            docker compose exec -T db psql -U crmka -c "
              CREATE TABLE IF NOT EXISTS \"_prisma_migrations\" (
                id VARCHAR(36) PRIMARY KEY,
                checksum VARCHAR(64) NOT NULL,
                finished_at TIMESTAMPTZ,
                migration_name VARCHAR(255) NOT NULL,
                logs TEXT,
                rolled_back_at TIMESTAMPTZ,
                started_at TIMESTAMPTZ NOT NULL DEFAULT now(),
                applied_steps_count INTEGER NOT NULL DEFAULT 0
              );
              INSERT INTO \"_prisma_migrations\" (id, checksum, migration_name, finished_at, applied_steps_count)
              SELECT gen_random_uuid(), '', '20260331093420_initial', NOW(), 1
              WHERE NOT EXISTS (SELECT 1 FROM \"_prisma_migrations\" WHERE migration_name = '20260331093420_initial');
            "
            docker compose exec -T app npx prisma migrate deploy
            # Перезагружаем nginx если конфиг менялся (bind-mount; контейнер сам не перечитывает)
            docker compose exec -T nginx nginx -t && docker compose exec -T nginx nginx -s reload || true
            # Чистим build cache старше 7 дней (иначе диск забивается за неделю)
            docker builder prune -af --filter "until=168h" || true
            echo "Deploy complete: $(date)"

      - name: Health check
        id: healthcheck
        run: |
          # Реальная проверка что сайт отдаёт ответы (а не только SSH-шаги прошли).
          # Ждём до 90 секунд (контейнер может подниматься после миграций).
          start=$(date +%s)
          for i in $(seq 1 18); do
            code=$(curl -sk -o /dev/null -w "%{http_code}" --max-time 10 https://dev.umnayacrm.ru/login || echo "000")
            elapsed=$(( $(date +%s) - start ))
            if [ "$code" = "200" ] || [ "$code" = "307" ] || [ "$code" = "308" ]; then
              echo "Health OK: HTTP $code after ${elapsed}s (попытка $i/18)"
              echo "elapsed=${elapsed}s" >> "$GITHUB_OUTPUT"
              echo "code=$code" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Попытка $i/18: HTTP $code (прошло ${elapsed}s), retry через 5s..."
            sleep 5
          done
          echo "Health check failed после 90s"
          echo "elapsed=90s+" >> "$GITHUB_OUTPUT"
          echo "code=$code" >> "$GITHUB_OUTPUT"
          exit 1

      - name: Notify Telegram on success
        if: success() && env.TG_TOKEN != ''
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          COMMIT_SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          COMMIT_MSG_FULL: ${{ github.event.head_commit.message }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          HEALTH_CODE: ${{ steps.healthcheck.outputs.code }}
          HEALTH_ELAPSED: ${{ steps.healthcheck.outputs.elapsed }}
        run: |
          # Экранируем HTML-спецсимволы (&, <, >) в динамических полях
          esc() { printf '%s' "$1" | sed -e 's/&/\&amp;/g' -e 's/</\&lt;/g' -e 's/>/\&gt;/g'; }
          TITLE=$(printf '%s' "$COMMIT_MSG_FULL" | head -n1)
          SHA_SHORT="${COMMIT_SHA:0:7}"
          TITLE_ESC=$(esc "$TITLE")
          ACTOR_ESC=$(esc "$ACTOR")
          MSG=$(printf '%s\n%s\n%s\n%s' \
            "✅ <b>Deployed &amp; live</b> — dev.umnayacrm.ru" \
            "<b>Commit:</b> <code>${SHA_SHORT}</code> ${TITLE_ESC}" \
            "<b>Author:</b> ${ACTOR_ESC} · <b>HTTP:</b> ${HEALTH_CODE} за ${HEALTH_ELAPSED}" \
            "<a href=\"${RUN_URL}\">CI run</a>")
          curl -fsS --max-time 10 \
            -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d "chat_id=${TG_CHAT}" \
            -d "parse_mode=HTML" \
            -d "disable_web_page_preview=true" \
            --data-urlencode "text=${MSG}"

      - name: Notify Telegram on failure
        if: failure() && env.TG_TOKEN != ''
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          COMMIT_SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          COMMIT_MSG_FULL: ${{ github.event.head_commit.message }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          HEALTH_CODE: ${{ steps.healthcheck.outputs.code }}
        run: |
          esc() { printf '%s' "$1" | sed -e 's/&/\&amp;/g' -e 's/</\&lt;/g' -e 's/>/\&gt;/g'; }
          TITLE=$(printf '%s' "$COMMIT_MSG_FULL" | head -n1)
          SHA_SHORT="${COMMIT_SHA:0:7}"
          TITLE_ESC=$(esc "$TITLE")
          ACTOR_ESC=$(esc "$ACTOR")
          # Если есть HEALTH_CODE — значит дошли до health-check, но он провалился (сайт не отвечает)
          # Если HEALTH_CODE пуст — упал сам деплой (SSH/build/migrate)
          if [ -n "$HEALTH_CODE" ]; then
            HEADER="⚠️ <b>Deployed but site is DOWN</b> — dev.umnayacrm.ru (HTTP ${HEALTH_CODE})"
          else
            HEADER="❌ <b>Deploy FAILED</b> — dev.umnayacrm.ru"
          fi
          MSG=$(printf '%s\n%s\n%s\n%s' \
            "$HEADER" \
            "<b>Commit:</b> <code>${SHA_SHORT}</code> ${TITLE_ESC}" \
            "<b>Author:</b> ${ACTOR_ESC}" \
            "<a href=\"${RUN_URL}\">Открыть логи</a>")
          curl -fsS --max-time 10 \
            -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d "chat_id=${TG_CHAT}" \
            -d "parse_mode=HTML" \
            -d "disable_web_page_preview=true" \
            --data-urlencode "text=${MSG}"
