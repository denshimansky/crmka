name: Deploy to dev

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'docker-compose.yml'
      - 'nginx/**'
      - 'scripts/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        id: deploy
        uses: appleboy/ssh-action@v1
        env:
          # Прокидывается в окружение удалённого скрипта через envs ниже.
          # Если секрет в GitHub не задан — переменная придёт пустой, и блок
          # провижинга .env её просто пропустит (см. условие в script).
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        with:
          host: 65.108.45.153
          port: 2280
          username: deploy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: CRON_SECRET
          script: |
            set -e  # любой провал шага = провал деплоя (раньше билд мог упасть, а up -d продолжал на старом образе)
            cd /opt/crmka
            git pull origin main
            # Гарантируем что dev-сервер имеет ALLOW_DESTRUCTIVE_API=true (для seed/reset)
            if ! grep -q "^ALLOW_DESTRUCTIVE_API=" .env 2>/dev/null; then
              echo "ALLOW_DESTRUCTIVE_API=true" >> .env
            fi
            # CRON_SECRET — если задан в GitHub Secrets и ещё не в .env, дописываем.
            # Перезалить старое значение скриптом сознательно не пытаемся: ротация
            # секрета — отдельная операция через sudo nano.
            if [ -n "${CRON_SECRET}" ] && ! grep -q "^CRON_SECRET=" .env 2>/dev/null; then
              echo "CRON_SECRET=${CRON_SECRET}" >> .env
            fi
            docker compose build app
            docker compose up -d
            # Baseline: если _prisma_migrations не существует, создаём и помечаем initial как applied
            docker compose exec -T db psql -U crmka -c "
              CREATE TABLE IF NOT EXISTS \"_prisma_migrations\" (
                id VARCHAR(36) PRIMARY KEY,
                checksum VARCHAR(64) NOT NULL,
                finished_at TIMESTAMPTZ,
                migration_name VARCHAR(255) NOT NULL,
                logs TEXT,
                rolled_back_at TIMESTAMPTZ,
                started_at TIMESTAMPTZ NOT NULL DEFAULT now(),
                applied_steps_count INTEGER NOT NULL DEFAULT 0
              );
              INSERT INTO \"_prisma_migrations\" (id, checksum, migration_name, finished_at, applied_steps_count)
              SELECT gen_random_uuid(), '', '20260331093420_initial', NOW(), 1
              WHERE NOT EXISTS (SELECT 1 FROM \"_prisma_migrations\" WHERE migration_name = '20260331093420_initial');
            "
            docker compose exec -T app npx prisma migrate deploy
            # Перезагружаем nginx если конфиг менялся (bind-mount; контейнер сам не перечитывает)
            docker compose exec -T nginx nginx -t && docker compose exec -T nginx nginx -s reload || true
            # Чистим build cache старше 7 дней (иначе диск забивается за неделю)
            docker builder prune -af --filter "until=168h" || true
            echo "Deploy complete: $(date)"

      - name: Health check
        id: healthcheck
        run: |
          # Реальная проверка что сайт отдаёт ответы (а не только SSH-шаги прошли).
          # Ждём до 90 секунд (контейнер может подниматься после миграций).
          start=$(date +%s)
          for i in $(seq 1 18); do
            code=$(curl -sk -o /dev/null -w "%{http_code}" --max-time 10 https://dev.umnayacrm.ru/login || echo "000")
            elapsed=$(( $(date +%s) - start ))
            if [ "$code" = "200" ] || [ "$code" = "307" ] || [ "$code" = "308" ]; then
              echo "Health OK: HTTP $code after ${elapsed}s (попытка $i/18)"
              echo "elapsed=${elapsed}s" >> "$GITHUB_OUTPUT"
              echo "code=$code" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Попытка $i/18: HTTP $code (прошло ${elapsed}s), retry через 5s..."
            sleep 5
          done
          echo "Health check failed после 90s"
          echo "elapsed=90s+" >> "$GITHUB_OUTPUT"
          echo "code=$code" >> "$GITHUB_OUTPUT"
          exit 1

      # Telegram-уведомления о деплое dev отключены (11.06.2026) — уведомляет
      # только прод-кандидат msk1 (deploy-timeweb.yml). Провал dev-деплоя виден
      # по красному статусу в GitHub Actions.
