name: Deploy to dev

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'docker-compose.yml'
      - 'nginx/**'
      - 'scripts/**'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        id: deploy
        uses: appleboy/ssh-action@v1
        with:
          host: 65.108.45.153
          port: 2280
          username: deploy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/crmka
            git pull origin main
            # Гарантируем что dev-сервер имеет ALLOW_DESTRUCTIVE_API=true (для seed/reset)
            if ! grep -q "^ALLOW_DESTRUCTIVE_API=" .env 2>/dev/null; then
              echo "ALLOW_DESTRUCTIVE_API=true" >> .env
            fi
            docker compose build app
            docker compose up -d
            # Baseline: если _prisma_migrations не существует, создаём и помечаем initial как applied
            docker compose exec -T db psql -U crmka -c "
              CREATE TABLE IF NOT EXISTS \"_prisma_migrations\" (
                id VARCHAR(36) PRIMARY KEY,
                checksum VARCHAR(64) NOT NULL,
                finished_at TIMESTAMPTZ,
                migration_name VARCHAR(255) NOT NULL,
                logs TEXT,
                rolled_back_at TIMESTAMPTZ,
                started_at TIMESTAMPTZ NOT NULL DEFAULT now(),
                applied_steps_count INTEGER NOT NULL DEFAULT 0
              );
              INSERT INTO \"_prisma_migrations\" (id, checksum, migration_name, finished_at, applied_steps_count)
              SELECT gen_random_uuid(), '', '20260331093420_initial', NOW(), 1
              WHERE NOT EXISTS (SELECT 1 FROM \"_prisma_migrations\" WHERE migration_name = '20260331093420_initial');
            "
            docker compose exec -T app npx prisma migrate deploy
            # Чистим build cache старше 7 дней (иначе диск забивается за неделю)
            docker builder prune -af --filter "until=168h" || true
            echo "Deploy complete: $(date)"

      - name: Notify Telegram on success
        if: success() && env.TG_TOKEN != ''
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          MSG: |
            ✅ <b>Deploy OK</b> — dev.umnayacrm.ru
            <b>Commit:</b> <code>${{ github.sha }}</code>
            <b>Author:</b> ${{ github.actor }}
            <b>Message:</b> ${{ github.event.head_commit.message }}
            <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">CI run</a>
        run: |
          curl -fsS --max-time 10 \
            -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d "chat_id=${TG_CHAT}" \
            -d "parse_mode=HTML" \
            -d "disable_web_page_preview=true" \
            --data-urlencode "text=${MSG}"

      - name: Notify Telegram on failure
        if: failure() && env.TG_TOKEN != ''
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          MSG: |
            ❌ <b>Deploy FAILED</b> — dev.umnayacrm.ru
            <b>Commit:</b> <code>${{ github.sha }}</code>
            <b>Author:</b> ${{ github.actor }}
            <b>Message:</b> ${{ github.event.head_commit.message }}
            <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">Открыть логи</a>
        run: |
          curl -fsS --max-time 10 \
            -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d "chat_id=${TG_CHAT}" \
            -d "parse_mode=HTML" \
            -d "disable_web_page_preview=true" \
            --data-urlencode "text=${MSG}"
