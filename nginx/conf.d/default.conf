server {
    listen 80;
    server_name dev.umnayacrm.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name dev.umnayacrm.ru;

    ssl_certificate /etc/letsencrypt/live/dev.umnayacrm.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev.umnayacrm.ru/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Security headers
    # HSTS: форсируем HTTPS на 2 года, включая поддомены. preload — только после проверки на hstspreload.org
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    # Запрет встраивания в <iframe> на чужих доменах — защита от clickjacking
    add_header X-Frame-Options "SAMEORIGIN" always;
    # Браузер не пытается угадать MIME-тип (защита от XSS через type confusion)
    add_header X-Content-Type-Options "nosniff" always;
    # Referer не передаётся на сторонние сайты в полном виде
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Запрещаем небезопасные браузерные API без явной нужды
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    # TODO: CSP — нужен аудит inline-скриптов Next.js перед включением, иначе сломает UI

    client_max_body_size 10M;

    # Закрытая зона: /dev (демо-вход), /testing (тест-кейсы), /bugs (баг-трекер)
    # Доступ через HTTP Basic Auth — гейт от случайных посетителей, не криптозащита
    location ~ ^/(dev|testing|bugs)(/|$) {
        auth_basic "Restricted";
        auth_basic_user_file /etc/nginx/.htpasswd;

        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location / {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
