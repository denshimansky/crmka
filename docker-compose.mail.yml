services:
  mailserver:
    image: ghcr.io/docker-mailserver/docker-mailserver:latest
    container_name: umnayacrm-mail
    hostname: mail.umnayacrm.ru
    domainname: umnayacrm.ru
    restart: unless-stopped
    ports:
      - "25:25"     # SMTP (входящая почта от других серверов)
      - "465:465"   # SMTPS (отправка приложением, implicit TLS)
      - "587:587"   # Submission (отправка, STARTTLS)
      - "993:993"   # IMAPS (чтение ящиков через клиент)
    volumes:
      - maildata:/var/mail
      - mailstate:/var/mail-state
      - maillogs:/var/log/mail
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./mail-config:/tmp/docker-mailserver
    environment:
      - OVERRIDE_HOSTNAME=mail.umnayacrm.ru
      - ENABLE_RSPAMD=1
      - ENABLE_CLAMAV=0
      - ENABLE_FAIL2BAN=1

      # SSL — сертификат Let's Encrypt, выпускается отдельно для mail.umnayacrm.ru
      - SSL_TYPE=letsencrypt
      - SSL_DOMAIN=mail.umnayacrm.ru

      # DKIM — подписывает исходящую почту, требуется DNS-запись
      - ENABLE_OPENDKIM=0
      - ENABLE_RSPAMD_DKIM=1

      # Лимиты
      - POSTFIX_MESSAGE_SIZE_LIMIT=20971520
      - ENABLE_QUOTAS=1
      - POSTFIX_MAILBOX_SIZE_LIMIT=1073741824

      - LOG_LEVEL=info
    cap_add:
      - NET_ADMIN  # требуется для fail2ban
    healthcheck:
      test: ["CMD-SHELL", "ss -tlnp | grep -qE ':25\\s'"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  maildata:
  mailstate:
  maillogs:
